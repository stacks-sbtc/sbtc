## Prometheus Host metrics

[sources.host_metrics]
type = "host_metrics"
collectors = ["cpu", "disk", "load", "filesystem", "host", "memory", "network"]
scrape_interval_secs = 15

[sources.host_metrics.filesystem.mountpoints]
includes = ["/"]

[sources.host_metrics.disk.devices]
includes = ["/dev/root", "nvme*", "tmpfs"]

[sources.app]
type = "prometheus_scrape"
endpoints = [
    "http://sbtc-signer-1:9181",
    "http://sbtc-signer-2:9182",
    "http://sbtc-signer-3:9183",
]
instance_tag = "signer"

## App Metric Sinks

[sinks.host_metrics_sink]
type = "prometheus_exporter"
inputs = ["host_metrics", "app"]
address = "0.0.0.0:9598"


## App Logs
#
# Receives logs from Docker's fluentd logging driver over the Fluentd
# forward protocol. This avoids mounting the Docker socket into the
# vector container, or writing to a file.
#
# Vector docs on this are at https://vector.dev/docs/reference/configuration/sources/fluent/ 
[sources.signer_logs]
type = "fluent"
address = "0.0.0.0:24224"

# Parse the JSON log messages from the signer's stdout. The fluentd driver
# sends the log line in the "log" field. If it parses as JSON, merge it
# into the top-level event.
[transforms.json_messages]
type = "remap"
inputs = ["signer_logs"]
drop_on_error = true
source = '''
.docker_container_id = del(.container_id)
.docker_container_name = del(.container_name)
.docker_host = del(.host)
.docker_source = del(.source)
.docker_source_type = del(.source_type)

parsed, err = parse_json(.log)
if err == null && is_object(parsed) {
  . = merge(., object!(parsed))
  del(.log)
}
'''

[sinks.loki]
type = "loki"
inputs = [ "json_messages"]
endpoint = "http://loki:3100"
out_of_order_action = "accept"

  [sinks.loki.encoding]
  codec = "json"

  [sinks.loki.labels]
  service = "{{ tag }}"

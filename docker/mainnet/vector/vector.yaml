sources:
  sbtc_signer_logs:
    type: fluent
    address: 0.0.0.0:24224

  sbtc_prometheus_metrics:
    type: prometheus_scrape
    endpoints:
      - http://sbtc-signer:9184

transforms:
  # Parse the JSON log messages from the signer's stdout.
  # The fluentd driver sends the log line in the "log" field.
  # If it parses as JSON, merge it into the top-level event.
  sbtc_signer_json:
    type: remap
    inputs:
      - sbtc_signer_logs
    drop_on_error: true
    source: |-
      .docker_container_id = del(.container_id)
      .docker_container_name = del(.container_name)
      .docker_host = del(.host)
      .docker_source = del(.source)
      .docker_source_type = del(.source_type)

      parsed, err = parse_json(.log)
      if err == null && is_object(parsed) {
        . = merge(., object!(parsed))
        del(.log)
      }

  # This is required because Cloudwatch is picky about empty tags ("dimensions")
  # And our `build` metric has an empty revision.
  sbtc_prometheus_metrics_strip_empty_tags:
    type: remap
    inputs:
      - sbtc_prometheus_metrics
    source: |-
      .tags = filter(object!(.tags)) -> |k, value| {
          is_empty(string!(value)) == false
      }

sinks:
  cloudwatch_sbtc_signer_logs:
    type: aws_cloudwatch_logs
    create_missing_group: false
    create_missing_stream: false
    inputs:
      - sbtc_signer_json
    region: eu-west-1
    group_name: sbtc-mainnet-partner-signers
    stream_name: "${STREAM_NAME}"
    healthcheck: false # We don't give the user permission to describe groups
    encoding:
      codec: json

  cloudwatch_sbtc_signer_metrics:
    type: aws_cloudwatch_metrics
    inputs:
      - sbtc_prometheus_metrics_strip_empty_tags
    compression: none
    default_namespace: ${STREAM_NAME}
    region: eu-west-1
